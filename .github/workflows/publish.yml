name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Normalize package version from release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: python scripts/set_release_version.py --release-tag "$RELEASE_TAG"

      - name: Install Python dependencies
        working-directory: agent
        run: pip install build

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Copy UI to agent
        run: |
          rm -rf agent/tether/static_ui
          cp -r ui/dist agent/tether/static_ui

      - name: Install sidecar dependencies
        run: npm install --workspaces

      - name: Build sidecar bundles
        run: ./scripts/build-sidecars.sh

      - name: Sync README for PyPI
        run: |
          cp README.md agent/README.md
          sed -i 's|src="tether_compact_logo.png"|src="https://raw.githubusercontent.com/larsderidder/tether/main/tether_compact_logo.png"|' agent/README.md

      - name: Build package
        working-directory: agent
        run: |
          rm -rf dist/
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: agent/dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
