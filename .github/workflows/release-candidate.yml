name: Release Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to package (for formula URLs)"
        required: true
      release_kind:
        description: "Package the release as stable or prerelease"
        required: false
        default: "prerelease"
      agent_sessions_ref:
        description: "Branch or tag to build from Adminrealagi/agent-sessions"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  package-rc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python build tools
        run: python -m pip install --upgrade build

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Copy UI to agent
        run: |
          rm -rf agent/tether/static_ui
          cp -r ui/dist agent/tether/static_ui

      - name: Install sidecar dependencies
        run: npm install --workspaces

      - name: Build sidecar bundles
        run: ./scripts/build-sidecars.sh

      - name: Sync README for wheel build
        run: |
          cp README.md agent/README.md
          sed -i 's|src="tether_compact_logo.png"|src="https://raw.githubusercontent.com/larsderidder/tether/main/tether_compact_logo.png"|' agent/README.md

      - name: Build wheel
        working-directory: agent
        run: python -m build

      - name: Resolve agent-sessions ref
        id: agent_sessions_ref
        env:
          INPUT_REF: ${{ inputs.agent_sessions_ref || '' }}
          RELEASE_CHANNEL: ${{ github.event_name == 'release' && (github.event.release.prerelease && 'prerelease' || 'stable') || inputs.release_kind }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "$INPUT_REF" ]]; then
            echo "ref=$INPUT_REF" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          import urllib.request

          channel = os.environ["RELEASE_CHANNEL"]
          token = os.environ.get("GITHUB_TOKEN", "")
          request = urllib.request.Request(
              "https://api.github.com/repos/Adminrealagi/agent-sessions/releases?per_page=20",
              headers={
                  "Accept": "application/vnd.github+json",
                  **({"Authorization": f"Bearer {token}"} if token else {}),
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              releases = json.loads(response.read().decode("utf-8"))
          match = None
          for item in releases:
              if not isinstance(item, dict) or item.get("draft"):
                  continue
              is_prerelease = bool(item.get("prerelease"))
              if channel == "prerelease" and not is_prerelease:
                  continue
              if channel == "stable" and is_prerelease:
                  continue
              tag_name = item.get("tag_name")
              if isinstance(tag_name, str) and tag_name:
                  match = tag_name
                  break
          if match is None:
              raise SystemExit(f"no {channel} agent-sessions release found")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"ref={match}\n")
          PY

      - name: Build agent-sessions wheel
        env:
          AGENT_SESSIONS_REF: ${{ steps.agent_sessions_ref.outputs.ref }}
        run: |
          git clone --depth 1 --branch "$AGENT_SESSIONS_REF" https://github.com/Adminrealagi/agent-sessions.git /tmp/agent-sessions
          python -m build /tmp/agent-sessions --outdir /tmp/agent-sessions-dist

      - name: Build release assets
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
              package_name="tether-ai-rc"
              primary_command_one="tether=tether-rc"
              primary_command_two="tether-mcp=tether-mcp-rc"
            else
              package_name="tether-ai"
              primary_command_one="tether=tether"
              primary_command_two="tether-mcp=tether-mcp"
            fi
          elif [[ "${{ inputs.release_kind }}" == "stable" ]]; then
            package_name="tether-ai"
            primary_command_one="tether=tether"
            primary_command_two="tether-mcp=tether-mcp"
          else
            package_name="tether-ai-rc"
            primary_command_one="tether=tether-rc"
            primary_command_two="tether-mcp=tether-mcp-rc"
          fi
          python scripts/build_rc_assets.py \
            --dist-dir agent/dist \
            --output-dir dist-rc \
            --package-name "$package_name" \
            --project-name tether-ai \
            --display-name Tether \
            --homepage https://gettether.dev \
            --release-tag "$RELEASE_TAG" \
            --repo-owner "$REPO_OWNER" \
            --repo-name "$REPO_NAME" \
            --install-extras discord \
            --extra-requirement "discord.py>=2.3.0" \
            --extra-wheel /tmp/agent-sessions-dist/agent_sessions-*.whl \
            --primary-command "$primary_command_one" \
            --primary-command "$primary_command_two"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tether-rc-assets
          path: dist-rc/*

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist-rc/*
